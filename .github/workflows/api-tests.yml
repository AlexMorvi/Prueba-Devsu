name: API Tests - Karate DSL

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Ejercicio API/**'
      - '.github/workflows/api-tests.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Ejercicio API/**'
      - '.github/workflows/api-tests.yml'
  workflow_dispatch:

jobs:
  api-tests:
    name: Run Karate API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 'Ejercicio API'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Verify Java and Maven versions
        run: |
          java -version
          mvn -version

      - name: Run API tests
        run: mvn clean test -B

      - name: Upload Karate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-reports
          path: 'Ejercicio API/target/karate-reports/'
          retention-days: 30

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: 'Ejercicio API/target/surefire-reports/'
          retention-days: 30
